# ROCm configuration for AMD Instinct MI250
device: "rocm:0"
gpu_arch: "gfx90a"

environment:
  HSA_OVERRIDE_GFX_VERSION: "9.0.0"
  HSA_ENABLE_SDMA: "0"
  PYTORCH_HIP_ALLOC_CONF: "garbage_collection_threshold:0.8,max_split_size_mb:1024"
  HIP_VISIBLE_DEVICES: "0"
  ROCR_VISIBLE_DEVICES: "0"

model:
  weights: "weights/wafer_yolov8l.pt"
  img_size: 640
  conf_threshold: 0.25
  iou_threshold: 0.45

benchmark:
  batch_sizes: [1, 8, 16, 32]
  warmup_iterations: 20
  test_iterations: 200
